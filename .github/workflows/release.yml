name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            asset_name: unofficial-messenger-next-windows-setup.exe
            artifact_name: windows-installer
          - name: macOS
            platform: macos-latest
            asset_name: unofficial-messenger-next-macos.dmg
            artifact_name: macos-installer
          - name: Linux
            platform: ubuntu-22.04
            asset_name: unofficial-messenger-next-linux.deb
            artifact_name: linux-installer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build production app
        run: bun run tauri build

      - name: Collect Windows installer
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows NSIS installer was not found."
          }
          Copy-Item $installer.FullName "release-assets/${{ matrix.asset_name }}"

      - name: Collect macOS installer
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p release-assets
          installer="$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -type f | head -n 1)"
          if [ -z "$installer" ]; then
            echo "macOS DMG installer was not found." >&2
            exit 1
          fi
          cp "$installer" "release-assets/${{ matrix.asset_name }}"

      - name: Collect Linux installer
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p release-assets
          installer="$(find src-tauri/target/release/bundle/deb -name '*.deb' -type f | head -n 1)"
          if [ -z "$installer" ]; then
            echo "Linux DEB installer was not found." >&2
            exit 1
          fi
          cp "$installer" "release-assets/${{ matrix.asset_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: unofficial-messenger-next ${{ github.ref_name }}
          body: Download the installer for your operating system from the assets below.
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release-assets/unofficial-messenger-next-windows-setup.exe
            release-assets/unofficial-messenger-next-macos.dmg
            release-assets/unofficial-messenger-next-linux.deb
